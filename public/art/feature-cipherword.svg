<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Cipherword gameplay artwork</title>
  <desc id="desc">A polished word puzzle board with semantic warmth and clue panels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#17142a"/>
      <stop offset="0.52" stop-color="#111827"/>
      <stop offset="1" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="meter" x1="0" x2="1">
      <stop offset="0" stop-color="#4b5563"/>
      <stop offset="0.48" stop-color="#f6c453"/>
      <stop offset="1" stop-color="#7c54ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <g opacity="0.2" stroke="#ffffff" stroke-width="1">
    <path d="M0 120h1600M0 240h1600M0 360h1600M0 480h1600M0 600h1600M0 720h1600"/>
    <path d="M160 0v900M320 0v900M480 0v900M640 0v900M800 0v900M960 0v900M1120 0v900M1280 0v900M1440 0v900"/>
  </g>
  <circle cx="1200" cy="200" r="220" fill="#7c54ff" opacity="0.16"/>
  <circle cx="390" cy="690" r="260" fill="#1769e0" opacity="0.12"/>
  <g filter="url(#shadow)">
    <rect x="250" y="155" width="760" height="590" rx="32" fill="#f8fafc"/>
    <rect x="285" y="190" width="690" height="74" rx="20" fill="#ffffff"/>
    <text x="322" y="239" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700">Cipherword</text>
    <rect x="732" y="210" width="210" height="34" rx="17" fill="#e8f1ff"/>
    <text x="760" y="233" fill="#1769e0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="700">Daily #001</text>
    <g transform="translate(305 312)">
      <rect width="76" height="76" rx="16" fill="#1d4ed8"/>
      <rect x="92" width="76" height="76" rx="16" fill="#f59e0b"/>
      <rect x="184" width="76" height="76" rx="16" fill="#e5e7eb"/>
      <rect x="276" width="76" height="76" rx="16" fill="#1d4ed8"/>
      <rect x="368" width="76" height="76" rx="16" fill="#e5e7eb"/>
      <rect x="460" width="76" height="76" rx="16" fill="#e5e7eb"/>
      <text x="26" y="51" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">C</text>
      <text x="118" y="51" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">I</text>
      <text x="211" y="51" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">P</text>
      <text x="302" y="51" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">H</text>
      <text x="395" y="51" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">E</text>
      <text x="486" y="51" fill="#6b7280" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="800">R</text>
    </g>
    <rect x="305" y="438" width="585" height="20" rx="10" fill="#e5e7eb"/>
    <rect x="305" y="438" width="505" height="20" rx="10" fill="url(#meter)"/>
    <text x="305" y="498" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Burning</text>
    <text x="305" y="532" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="20">Almost there. Letter logic should finish it.</text>
    <rect x="305" y="585" width="585" height="74" rx="20" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="333" y="632" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="24">Type any word or phrase</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="1060" y="190" width="330" height="520" rx="30" fill="#ffffff" opacity="0.96"/>
    <text x="1100" y="250" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="760">Signal Trail</text>
    <rect x="1100" y="286" width="250" height="78" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
    <text x="1122" y="318" fill="#1769e0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Start</text>
    <text x="1122" y="344" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">Shape 6; Language</text>
    <rect x="1100" y="384" width="250" height="90" rx="18" fill="#f8fafc" stroke="#e5e7eb"/>
    <text x="1122" y="416" fill="#1769e0" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Clue 1</text>
    <text x="1122" y="442" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18">Broad domain: code</text>
    <rect x="1100" y="506" width="250" height="88" rx="18" fill="#111827"/>
    <text x="1122" y="540" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="800">Closest guess</text>
    <text x="1122" y="570" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="760">decode</text>
    <rect x="1100" y="626" width="108" height="38" rx="19" fill="#e8f1ff"/>
    <text x="1124" y="651" fill="#1769e0" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="760">Archive</text>
  </g>
</svg>
